<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>buzz — qb-moderator</title>
<style>
  :root {
    --bg: #101418; --raised: #1a1f25; --input: #15191e; --border: #3a3f47;
    --link: #6b9eff; --text: #c8ccd1; --bright: #e0e0e0; --muted: #9aa0a7;
    --faint: #808790; --good: #4caf7d; --bad: #e05555;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); color: var(--text);
         font: 16px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
         display: flex; flex-direction: column; overflow-y: auto; }
  .muted { color: var(--muted); font-size: 0.86rem; }
  .good { color: var(--good); } .bad { color: var(--bad); }

  /* join screen */
  #join { max-width: 22rem; margin: 14vh auto 0; padding: 0 1.2rem; width: 100%; }
  #join h1 { font-size: 1.2rem; color: var(--bright); }
  #join input { width: 100%; padding: 0.8rem; margin: 0.3rem 0 0.7rem; font-size: 1.1rem;
    background: var(--input); color: var(--text); border: 1px solid var(--border);
    border-radius: 9px; }
  #join input#code { text-transform: uppercase; letter-spacing: 0.3em; font-weight: 700; }
  #join button { width: 100%; padding: 0.9rem; font-size: 1.1rem; font-weight: 700;
    background: var(--link); color: #fff; border: none; border-radius: 9px; cursor: pointer; }
  #joinerr { color: var(--bad); min-height: 1.3em; font-size: 0.9rem; }

  /* game screen */
  #game { flex: 1; display: none; flex-direction: column; }
  #topline { display: flex; gap: 0.8rem; align-items: baseline; padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border); }
  #topline b { color: var(--bright); letter-spacing: 0.15em; }
  #conn { margin-left: auto; }
  #buzzmode, #mutebtn { background: var(--input); color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.78rem; padding: 0.1rem 0.5rem; cursor: pointer; }

  #answerbar { display: none; padding: 0.7rem 1rem 0; }
  #answerbar.on { display: block; }
  #verdictline { min-height: 1.3em; font-size: 0.95rem; padding-bottom: 0.3rem; }
  #answerrow { display: flex; gap: 0.5rem; }
  #answerrow input { flex: 1; min-width: 0; padding: 0.7rem 0.8rem; font-size: 1.05rem;
    background: var(--input); color: var(--text); border: 1px solid var(--border);
    border-radius: 9px; }
  #answerrow button { padding: 0.7rem 1.2rem; font-size: 1rem; font-weight: 700;
    background: var(--link); color: #fff; border: none; border-radius: 9px; cursor: pointer; }
  #answerrow input:disabled, #answerrow button:disabled { opacity: 0.5; }

  /* Fills the free space but NEVER shrinks: the scoreboard and Past
     Questions growing below push the page into scroll instead. */
  #bigbuzz { flex: 1 0 auto; min-height: 45vh; margin: 1rem; border: none; border-radius: 22px;
    font-size: 2.2rem; font-weight: 800; color: #06120b; background: var(--good);
    cursor: pointer; touch-action: none; transition: background 0.1s; }
  #bigbuzz.waiting { background: var(--input); color: var(--faint); }
  #bigbuzz.mine { background: var(--bad); color: #fff; }
  #bigbuzz.other { background: var(--raised); color: var(--muted); }
  #bigbuzz.locked { background: var(--input); color: var(--faint);
    text-decoration: line-through; }

  #board { padding: 0 1.2rem 0.6rem; }
  #pastq { padding: 0 1.2rem 1.6rem; }
  #pastq h2 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--faint); margin: 0.8rem 0 0.3rem; font-weight: 600; }
  #pastq details { border-top: 1px solid var(--border); padding: 0.35rem 0; }
  #pastq summary { cursor: pointer; list-style: none; display: flex; gap: 0.6rem;
    align-items: baseline; }
  #pastq summary::before { content: '▸'; color: var(--faint); }
  #pastq details[open] summary::before { content: '▾'; }
  #pastq summary b { color: var(--bright); font-weight: 650; white-space: nowrap; }
  #pastq summary .sum { color: var(--muted); font-size: 0.88rem; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  #pastq .qbody { font-size: 0.98rem; line-height: 1.65; padding: 0.4rem 0 0.3rem; }
  #pastq .qans { color: var(--muted); padding-bottom: 0.2rem; }
  #pastq .qans u, #pastq .qans b { color: var(--bright); }
  #pastq .qbonus { border-top: 1px dashed var(--border); margin-top: 0.4rem; padding-top: 0.35rem; }
  .bteam { margin-top: 0.7rem; }
  .bteam .bhead { display: flex; justify-content: space-between; font-weight: 700;
    color: var(--bright); border-bottom: 1px solid var(--border); padding-bottom: 0.15rem; }
  .brow { display: flex; justify-content: space-between; padding: 0.18rem 0;
    color: var(--muted); }
  .brow.me { color: var(--bright); font-weight: 700; }
  .brow.locked { opacity: 0.45; }
  .bstat { color: var(--faint); font-size: 0.78em; font-weight: 400; }
</style>
</head>
<body>
  <div id="join">
    <h1>Join room</h1>
    <input id="code" placeholder="CODE" maxlength="4" autocomplete="off">
    <input id="name" placeholder="Your name" maxlength="40" autocomplete="off">
    <button id="joinbtn">Join</button>
    <div id="joinerr"></div>
  </div>

  <div id="game">
    <div id="topline">
      <b id="roomcode"></b>
      <span class="muted" id="qlabel"></span>
      <span class="muted" id="audiostat"></span>
      <button id="mutebtn" style="display:none" title="Mute the broadcast audio on this phone"></button>
      <button id="buzzmode" title="When your buzz fires: the instant you touch the button, or when you let go"></button>
      <span class="muted" id="conn">●</span>
    </div>
    <div id="answerbar">
      <div id="verdictline"></div>
      <div id="answerrow">
        <input id="answer" placeholder="Answer" autocomplete="off" autocapitalize="off">
        <button id="senda">Send</button>
      </div>
    </div>
    <button id="bigbuzz" class="waiting">…</button>
    <div id="board"></div>
    <div id="pastq"></div>
  </div>

<script src="sync.js"></script>
<script>
(() => {
'use strict';
const DEFAULT_SERVER = 'https://qb-rooms.denisliu10.workers.dev';
const qbSync = globalThis.qbSync;
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
const params = new URLSearchParams(location.search);
const server = params.get('server') || DEFAULT_SERVER;
if (params.get('code')) $('code').value = params.get('code');
if (localStorage.qbmodName) $('name').value = localStorage.qbmodName;

let ws = null, me = '', code = '', armed = false, mineBuzz = false, closed = false;
let lastBuzzer = null; // buzz winner, shown on everyone's button until the verdict or re-arm
let sentBuzz = false; // optimistic: our buzz is in flight, verdict pending
let snapshot = null, qlog = [];

// ---- audio broadcast (SPEC.md, additive v1.1) ----
// The host can stream its TTS audio here. This phone downloads the
// whole packet's .opus files straight from the qb-audio CDN (the room
// server only carries control messages), then plays the one the host's
// audio_start/resume names, scheduled on the server clock so every
// device starts together.
let aEl = null;              // shared Audio element, created inside the Join tap (autoplay unlock)
let manifest = [];           // [{qid, url}] for the current packet
let blobs = new Map();       // qid -> object URL (fully downloaded)
let failed = new Set();      // qids whose download failed
let fetching = new Set();    // qids being downloaded right now
let curQid = null;           // qid loaded into aEl
let playTimer = null;        // pending scheduled play()
let syncSamples = [];        // completed {rtt, offset} sync exchanges
let coarseOffset = null;     // fallback offset from stamped relays (no sync replies)
let muted = localStorage.qbmodPlayerMute === '1';

$('joinbtn').onclick = join;
$('code').oninput = () => { $('code').value = $('code').value.toUpperCase(); };

function join() {
  code = $('code').value.trim().toUpperCase();
  me = $('name').value.trim();
  if (!/^[A-Z2-9]{4}$/.test(code)) { $('joinerr').textContent = 'Enter the 4-letter room code.'; return; }
  if (!me) { $('joinerr').textContent = 'Enter your name.'; return; }
  localStorage.qbmodName = me;
  unlockAudio();   // the Join tap is the user gesture autoplay policies need
  connect();
}

// Create the one shared Audio element inside a user gesture and play a
// beat of silence through it — after this, programmatic play() on the
// SAME element works for the rest of the session (iOS/Android policy).
function unlockAudio() {
  if (aEl) return;
  aEl = new Audio();
  try { aEl.preservesPitch = true; } catch (e) { /* older browsers */ }
  aEl.muted = muted;
  // One silent sample, WAV, inline.
  aEl.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
  aEl.play().catch(() => {});
  renderMute();
}

function connect() {
  const url = server.replace(/^http/, 'ws') +
    '/rooms/' + code + '/ws?role=player&name=' + encodeURIComponent(me);
  ws = new WebSocket(url);
  ws.onopen = () => {
    $('join').style.display = 'none';
    $('game').style.display = 'flex';
    $('roomcode').textContent = code;
    $('conn').textContent = '●';
    $('conn').className = 'good';
    keepAwake();
    syncBurst();
  };
  ws.onmessage = e => {
    let m; try { m = JSON.parse(e.data); } catch (err) { return; }
    // Coarse clock fallback: a stamped relay bounds the server clock to
    // within one-way latency, useful only until a real sync reply lands.
    if (m.sv != null && coarseOffset === null) coarseOffset = m.sv - Date.now();
    // Echo RTT probes immediately (first, before any rendering) — the
    // server's latency-equalized buzz arbitration depends on them.
    if (m.t === 'ping') { try { ws.send(JSON.stringify({ t: 'pong', n: m.n, ts: m.ts })); } catch (err) {} return; }
    if (m.t === 'welcome') {
      armed = m.armed; snapshot = m.snapshot; qlog = m.qlog || [];
      mineBuzz = false; sentBuzz = false; lastBuzzer = null;
      answerBar(null); renderAll(); renderPast();
      if (m.audioManifest) setManifest(m.audioManifest);
      // Mid-question (re)connects learn the current audio position from
      // the host's targeted audio_state reply — there is no heartbeat.
      send({ t: 'audio_resync' });
    }
    else if (m.t === 'qlog') { qlog = m.qlog || []; renderPast(); }
    else if (m.t === 'arm') { armed = true; mineBuzz = false; sentBuzz = false; lastBuzzer = null; answerBar(null); vibrate(40); renderBuzz(); }
    else if (m.t === 'disarm') { armed = false; sentBuzz = false; renderBuzz(); }
    else if (m.t === 'buzz_pending') {
      // First arrival at the server: pause NOW, same instant the host
      // hears it — no lag compensation, no host round trip. The host's
      // audio_pause follows and re-anchors the exact position.
      audioPause();
    }
    else if (m.t === 'buzz') {
      armed = false;
      sentBuzz = false;
      lastBuzzer = m.name;
      audioPause();   // belt over buzz_pending's suspenders
      if (m.name === me) {
        mineBuzz = true; vibrate([60, 40, 60]);
        $('answer').value = '';
        answerBar('input');
      }
      renderBuzz();
    }
    else if (m.t === 'sync') {
      syncSamples.push(qbSync.sampleFromExchange(m.c, m.s, Date.now()));
      if (syncSamples.length > 8) syncSamples.shift();
    }
    else if (m.t === 'audio_manifest') setManifest(m.entries || []);
    else if (m.t === 'audio_start' || m.t === 'audio_resume') handleAudioPlay(m);
    else if (m.t === 'audio_pause') { audioPause(); if (m.qid === curQid) seekTo(m.pos); }
    else if (m.t === 'audio_rate') {
      if (m.qid !== curQid || !aEl) return;
      aEl.playbackRate = m.rate;
      seekTo(qbSync.anchorTarget(m, offset(), Date.now()));
    }
    else if (m.t === 'audio_stop') audioStop();
    else if (m.t === 'audio_state') {
      if (m.for && m.for !== me) return;
      handleAudioState(m);
    }
    else if (m.t === 'answer_result') {
      // A terminal verdict settles everyone's button, not just the buzzer's.
      if (m.result !== 'prompt' && m.name === lastBuzzer) { lastBuzzer = null; renderBuzz(); }
      if (m.name !== me) return;
      if (m.result === 'prompt') {
        vibrate(60);
        answerBar('prompt', 'prompt' + (m.prompt ? ': ' + esc(m.prompt) : ''));
      } else if (m.result === 'correct') {
        vibrate([40, 30, 40]);
        answerBar('done', '<span class="good">correct</span>');
      } else if (m.result === 'wrong') {
        vibrate(80);
        answerBar('done', '<span class="bad">wrong</span>');
      } else answerBar(null);
    }
    else if (m.t === 'rejected') { sentBuzz = false; renderBuzz(); }
    else if (m.t === 'state') { snapshot = m.snapshot; renderAll(); }
  };
  ws.onclose = () => {
    $('conn').textContent = '○ reconnecting…';
    $('conn').className = 'bad';
    if (!closed) setTimeout(connect, 2000);
  };
}

function vibrate(p) { try { navigator.vibrate && navigator.vibrate(p); } catch (e) {} }

function send(obj) {
  if (ws && ws.readyState === 1) { try { ws.send(JSON.stringify(obj)); } catch (e) {} }
}

// ---- audio broadcast internals ----

const offset = () => {
  const o = qbSync.bestOffset(syncSamples);
  return o !== null ? o : (coarseOffset !== null ? coarseOffset : 0);
};

function syncBurst() {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => send({ t: 'sync', c: Date.now() }), i * 150);
  }
}

// Download every file in the manifest (2 at a time) into object URLs;
// report each qid to the host as it resolves — that feeds the host's
// per-question start gate. Re-sent manifests only fetch what's new.
function setManifest(entries) {
  manifest = entries || [];
  const keep = new Set(manifest.map(e => e.qid));
  for (const [qid, url] of blobs) {
    if (!keep.has(qid)) { URL.revokeObjectURL(url); blobs.delete(qid); }
  }
  pumpDownloads();
  renderAudioStat();
}

function pumpDownloads() {
  if (!aEl) return;   // no unlocked audio, no point
  if (fetching.size >= 2) return;
  const next = manifest.find(e => !blobs.has(e.qid) && !failed.has(e.qid) && !fetching.has(e.qid));
  if (!next) return;
  fetching.add(next.qid);
  fetch(next.url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.blob(); })
    .then(b => {
      blobs.set(next.qid, URL.createObjectURL(b));
      send({ t: 'audio_ready', qid: next.qid });
    })
    .catch(() => {
      failed.add(next.qid);
      send({ t: 'audio_error', qid: next.qid });
    })
    .finally(() => {
      fetching.delete(next.qid);
      renderAudioStat();
      pumpDownloads();
    });
  pumpDownloads();   // fill the second slot
}

// Point aEl at a qid: prefer the downloaded blob, fall back to the CDN
// URL from the manifest (a straggler that gets an audio_state before
// its download finished still plays — the network src streams).
function loadQid(qid) {
  if (curQid === qid && aEl.src) return true;
  const entry = manifest.find(e => e.qid === qid);
  const src = blobs.get(qid) || (entry && entry.url);
  if (!src) return false;
  curQid = qid;
  aEl.src = src;
  return true;
}

// Seeks can land before metadata; retry once it's there.
function seekTo(t) {
  if (!aEl) return;
  if (aEl.readyState >= 1) { try { aEl.currentTime = t; } catch (e) {} }
  else aEl.addEventListener('loadedmetadata', () => { try { aEl.currentTime = t; } catch (e) {} }, { once: true });
}

function clearPlayTimer() {
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
}

function audioPause() {
  clearPlayTimer();
  if (aEl && curQid) aEl.pause();
}

function audioStop() {
  clearPlayTimer();
  if (!aEl) return;
  aEl.pause();
  if (curQid) { aEl.removeAttribute('src'); try { aEl.load(); } catch (e) {} }
  curQid = null;
}

// audio_start / audio_resume: everything needed to play is in the
// message — the qid, the host position pos, the rate, and the server
// start instant at. Schedule for the local equivalent of at; if that
// already passed (slow phone, late join), start now seeked forward by
// the overshoot.
function handleAudioPlay(m) {
  if (!aEl || !loadQid(m.qid)) return;
  clearPlayTimer();
  aEl.playbackRate = m.rate || 1;
  const d = qbSync.playDelay(m.at, offset(), Date.now());
  if (d > 0) {
    seekTo(m.pos);
    playTimer = setTimeout(() => { playTimer = null; aEl.play().catch(() => renderAudioStat(true)); }, d);
  } else {
    seekTo(qbSync.lateSeek(m.pos, -d, m.rate || 1));
    aEl.play().catch(() => renderAudioStat(true));
  }
}

// audio_state: the host's answer to a resync (or an undo broadcast) —
// jump straight to where the host is, no scheduling.
function handleAudioState(m) {
  if (!aEl) return;
  if (m.playing) {
    if (!loadQid(m.qid)) return;
    clearPlayTimer();
    aEl.playbackRate = m.rate || 1;
    seekTo(qbSync.anchorTarget(m, offset(), Date.now()));
    aEl.play().catch(() => renderAudioStat(true));
  } else {
    audioPause();
    if (loadQid(m.qid)) { aEl.playbackRate = m.rate || 1; seekTo(m.pos); }
  }
}

// Topline audio status: download progress while the packet loads, then
// nothing (quiet when healthy), ♪✗ if anything failed, ♪ blocked if
// play() was refused.
function renderAudioStat(blocked) {
  const el = $('audiostat');
  if (blocked) { el.textContent = '♪ blocked'; el.className = 'bad'; return; }
  if (!manifest.length) { el.textContent = ''; $('mutebtn').style.display = 'none'; return; }
  $('mutebtn').style.display = '';
  const have = manifest.filter(e => blobs.has(e.qid)).length;
  if (failed.size) { el.textContent = '♪✗' + failed.size; el.className = 'bad'; }
  else if (have < manifest.length) { el.textContent = '♪ ' + have + '/' + manifest.length; el.className = 'muted'; }
  else { el.textContent = '♪'; el.className = 'good'; }
}

function renderMute() {
  $('mutebtn').textContent = muted ? '🔇' : '🔊';
  if (aEl) aEl.muted = muted;
}
$('mutebtn').onclick = () => {
  muted = !muted;
  localStorage.qbmodPlayerMute = muted ? '1' : '0';
  renderMute();
};
renderMute();

// The typed-answer bar over the buzz button. States: 'input' (my buzz
// won, type it), 'sent' (waiting on the verdict), 'prompt' (try again),
// 'done' (terminal verdict shown), null (hidden). Verdicts for buzzes
// with no typed answer land here too, so a host ✓/✗ still shows.
function answerBar(state, html) {
  const typing = state === 'input' || state === 'prompt';
  $('answerbar').classList.toggle('on', !!state);
  $('verdictline').innerHTML = html || '';
  $('answerrow').style.display = state === 'done' ? 'none' : '';
  $('answer').disabled = !typing;
  $('senda').disabled = !typing;
  if (typing) { $('answer').focus(); $('answer').select(); }
}

function sendAnswer() {
  const text = $('answer').value.trim();
  if (!text || $('senda').disabled || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ t: 'answer', text }));
  answerBar('sent', '<span class="muted">…</span>');
}
$('senda').onclick = sendAnswer;
$('answer').addEventListener('keydown', e => { if (e.key === 'Enter') sendAnswer(); });

// A sleeping phone can't buzz: hold a screen wake lock while in a room,
// re-acquiring on tab return (the OS releases it on hide).
async function keepAwake() {
  try { await navigator.wakeLock.request('screen'); } catch (e) { /* unsupported/denied */ }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && ws) keepAwake();
});

function amLocked() {
  const p = snapshot && snapshot.players && snapshot.players.find(x => x.name === me);
  return !!(p && p.locked);
}

// Buzz timing is a per-player toggle: "press" fires on pointerdown (the
// instant of finger contact — no tap-recognition delay, no press-duration
// variance in the race; the latency-optimal default) while "release"
// fires on pointerup for players who prefer committing on let-go.
// touch-action:none on the button keeps a touch there from ever being
// read as a scroll in either mode.
let buzzMode = localStorage.qbmodBuzzMode === 'release' ? 'release' : 'press';
function renderMode() {
  $('buzzmode').textContent = buzzMode === 'press' ? 'buzz: press ↓' : 'buzz: release ↑';
}
$('buzzmode').onclick = () => {
  buzzMode = buzzMode === 'press' ? 'release' : 'press';
  localStorage.qbmodBuzzMode = buzzMode;
  renderMode();
};
renderMode();

function sendBuzz() {
  if (!armed || sentBuzz || amLocked() || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ t: 'buzz' }));
  // Optimistic feedback: turn red NOW — the server verdict (win, someone
  // else, or rejected) reconciles when it arrives, which can lag by a
  // round trip plus the arbitration window. Broadcast audio pauses on
  // the same optimism (zero latency for the buzzer's own ears); it's
  // safe because a rejection while audio plays means someone else's
  // buzz opened the window, which pauses everyone anyway — and the
  // voided-buzz path restarts us via the host's audio_resume.
  sentBuzz = true;
  audioPause();
  vibrate(30);
  renderBuzz();
}
$('bigbuzz').onpointerdown = () => { if (buzzMode === 'press') sendBuzz(); };
$('bigbuzz').onpointerup = () => { if (buzzMode === 'release') sendBuzz(); };

// Desktop players buzz with Space; it follows the same press/release
// toggle (keydown vs keyup). e.repeat guards a held key; inputs on the
// join screen keep their spacebar.
function keyGuard(e) {
  if (e.code !== 'Space') return false;
  const tag = e.target && e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return false;
  e.preventDefault();
  return true;
}
document.addEventListener('keydown', e => {
  if (keyGuard(e) && !e.repeat && buzzMode === 'press') sendBuzz();
});
document.addEventListener('keyup', e => {
  if (keyGuard(e) && buzzMode === 'release') sendBuzz();
});

function renderBuzz() {
  const b = $('bigbuzz');
  if (mineBuzz) { b.className = 'mine'; b.textContent = 'YOU BUZZED'; }
  else if (lastBuzzer) { b.className = 'other'; b.textContent = lastBuzzer + ' buzzed'; }
  else if (sentBuzz) { b.className = 'mine'; b.textContent = 'BUZZED'; }
  else if (amLocked()) { b.className = 'locked'; b.textContent = 'locked out'; }
  else if (armed) { b.className = ''; b.textContent = 'BUZZ'; }
  else { b.className = 'waiting'; b.textContent = '…'; }
}

function renderAll() {
  $('qlabel').textContent = (snapshot && snapshot.label) || '';
  renderBuzz();
  const board = $('board');
  if (!snapshot || !snapshot.teams) { board.innerHTML = ''; return; }
  const stat = p => p.stats
    ? `<span class="bstat">${p.stats.powers}/${p.stats.gets}/${p.stats.negs}</span>` : '';
  board.innerHTML = snapshot.teams.map(t => `
    <div class="bteam">
      <div class="bhead"><span>${esc(t.name)}${t.heard
        ? ` <span class="bstat">ppb ${(+t.ppb).toFixed(1)}</span>` : ''}</span><span>${t.score}</span></div>
      ${(snapshot.players || []).filter(p => p.team === t.name).map(p => `
        <div class="brow ${p.name === me ? 'me' : ''} ${p.locked ? 'locked' : ''}">
          <span>${esc(p.name)} ${stat(p)}</span><span>${p.score}</span></div>`).join('')}
    </div>`).join('')
    + ((snapshot.players || []).some(p => !p.team) ? `
    <div class="bteam">
      <div class="bhead"><span class="muted">Players</span><span></span></div>
      ${(snapshot.players || []).filter(p => !p.team).map(p => `
        <div class="brow ${p.name === me ? 'me' : ''} ${p.locked ? 'locked' : ''}">
          <span>${esc(p.name)} ${stat(p)}</span><span>${p.score}</span></div>`).join('')}
    </div>` : '');
}

// A qlog entry carries its bonus only if the room heard it (host-side
// spoiler gate); answers arrive pre-formatted HTML like the tossup's.
function bonusHtml(b) {
  if (!b) return '';
  return `<div class="qbonus"><div class="qbody">${esc(b.leadin)}</div>`
    + (b.parts || []).map((p, i) => `
      <div class="qbody">${esc(p)}</div>
      <div class="qans">${(b.answers || [])[i] || ''}</div>`).join('')
    + '</div>';
}

function renderPast() {
  const el = $('pastq');
  if (!qlog.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<h2>Past questions</h2>' + qlog.slice().reverse().map(q => `
    <details>
      <summary><b>${esc(q.label)}</b><span class="sum">${esc(q.summary)}</span></summary>
      <div class="qbody">${esc(q.question)}</div>
      <div class="qans">${q.answer}</div>
      ${bonusHtml(q.bonus)}
    </details>`).join('');
}
})();
</script>
</body>
</html>
