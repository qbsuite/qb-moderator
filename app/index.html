<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>qb-moderator</title>
<style>
  :root {
    --bg: #101418; --raised: #1a1f25; --input: #15191e; --border: #3a3f47;
    --link: #6b9eff; --text: #c8ccd1; --bright: #e0e0e0; --muted: #9aa0a7;
    --faint: #808790; --good: #4caf7d; --bad: #e05555; --power: #d9a521;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); color: var(--text);
         font: 15px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif;
         display: flex; }
  button { font: inherit; color: var(--text); background: var(--input);
    border: 1px solid var(--border); border-radius: 7px; padding: 0.4rem 0.8rem;
    cursor: pointer; touch-action: manipulation; }
  button:disabled { opacity: .4; }
  select, input[type=text], input[type=number], textarea { font: inherit;
    color: var(--text); background: var(--input); border: 1px solid var(--border);
    border-radius: 7px; padding: 0.35rem 0.5rem; }
  .muted { color: var(--muted); font-size: 0.86rem; }
  .faint { color: var(--faint); }
  .good { color: var(--good); } .bad { color: var(--bad); }
  .grow { flex: 1; }
  .hidden { display: none !important; }

  .app { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh;
    overflow-y: auto; }

  header { display: flex; align-items: center; gap: 0.7rem;
    padding: 0.45rem 1.1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  header h1 { font-size: 1rem; margin: 0; color: var(--bright); font-weight: 650; }
  header .setname { color: var(--muted); font-size: 0.88rem; }
  header .setname b { color: var(--bright); }
  header .hbtn { padding: 0.28rem 0.6rem; font-size: 0.88rem; }

  main { padding: 0.9rem 1.4rem 1.1rem; }
  .modeline { font-size: 0.85rem; color: var(--muted); padding-bottom: 0.25rem;
    min-height: 1.3em; }
  .modeline .warn { color: var(--power); }
  .qtext { font-size: 1.16rem; line-height: 1.8; }
  .qtext .mark { color: var(--power); font-weight: 700; }
  .qtext .unread { visibility: hidden; }
  .qtext .w { cursor: pointer; border-radius: 3px; }
  .qtext .w:hover { background: rgba(107,158,255,0.18); }
  .buzzword { background: rgba(224,85,85,0.3); outline: 1px solid var(--bad); border-radius: 3px; }
  .anspanel { padding: 0.45rem 0 0.1rem; font-size: 1.08rem; }
  .anspanel .lbl { color: var(--faint); font-size: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.05em; margin-right: 0.5rem; }
  .anspanel u, .anspanel b { color: var(--bright); }

  .bonus { margin-top: 0.9rem; border-top: 1px solid var(--border); padding-top: 0.7rem; }
  .bonus .blabel { color: var(--faint); font-size: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 0.15rem; }
  .bonus .leadin, .bpart .bq { font-size: 1.16rem; line-height: 1.8; }
  .bpart { margin: 0.45rem 0; }
  .bpart .bans { font-size: 1rem; color: var(--muted); margin-top: 0.05rem;
    display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
  .bpart .bans u, .bpart .bans b { color: var(--bright); }
  .bpart .bans button { padding: 0.2rem 0.7rem; font-size: 0.88rem; }
  .bpart .scored { font-weight: 700; }

  .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
    margin-top: 0.8rem; }
  .speedctl { display: flex; align-items: center; gap: 0.4rem;
    color: var(--muted); font-size: 0.86rem; }
  .speedctl input { width: 8rem; }
  .buzzbtn { padding: 0.6rem 1.6rem; font-size: 1.05rem; font-weight: 700;
    border-radius: 9px; background: var(--good); border-color: var(--good); color: #06120b; }
  .buzzbtn.buzzed { background: var(--bad); border-color: var(--bad); color: #fff; }
  .progress { height: 4px; background: var(--input); border-radius: 2px; margin-top: 0.5rem; }
  .progress i { display: block; height: 100%; width: 0; background: var(--link); border-radius: 2px; }
  .adjrow { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
    margin-top: 0.6rem; max-width: 46rem; }
  .adjrow input { flex: 1; min-width: 10rem; padding: 0.5rem 0.7rem; }
  .adjrow .verdicthint { font-size: 0.88rem; }

  .scoring { border-top: 2px solid var(--border); margin-top: 0.9rem;
    padding: 0.4rem 1.4rem 2rem; display: flex; gap: 2.2rem; flex-wrap: wrap; }
  .scorebar { width: 100%; display: flex; gap: 0.4rem; margin-bottom: -0.4rem; }
  .scorebar button { padding: 0.2rem 0.55rem; font-size: 0.8rem; color: var(--muted); }
  .team { flex: 1; min-width: 20rem; }
  .teamhead { display: flex; justify-content: center; align-items: baseline; gap: 0.7rem;
    padding: 0.15rem 0 0.45rem; }
  .teamhead .tname { font-size: 1.15rem; font-weight: 700; color: var(--bright); cursor: pointer; }
  .teamhead .tname.unassigned { color: var(--faint); cursor: default; }
  .teamhead .tscore { font-size: 1.5rem; font-weight: 800; color: var(--bright); }
  .team.dragover { outline: 1px dashed var(--link); outline-offset: 4px; border-radius: 8px; }
  .prow { display: flex; align-items: center; gap: 0.6rem;
    background: var(--raised); border: 1px solid var(--border); border-radius: 9px;
    padding: 0.45rem 0.7rem; margin-bottom: 0.45rem; }
  .prow.locked { opacity: 0.45; }
  .prow.dragging { opacity: 0.4; }
  .prow.droptarget { border-color: var(--link); }
  .prow .handle { color: var(--faint); cursor: grab; touch-action: none; padding: 0 0.15rem; }
  .prow .pname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; font-weight: 600; font-size: 1.02rem; }
  .prow .pscore { font-weight: 800; font-size: 1.1rem; color: var(--bright);
    min-width: 2.2ch; text-align: right; }
  .prow .pbtns { display: flex; gap: 4px; }
  .prow .pbtns button { padding: 0.32rem 0.55rem; font-size: 0.86rem; font-weight: 700;
    border-radius: 6px; min-width: 2.9rem; }

  .histbar { width: 16.5rem; flex-shrink: 0; border-left: 1px solid var(--border);
    height: 100vh; overflow-y: auto; padding: 0.6rem 0.8rem 1rem; }
  .histbar h2 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--faint); margin: 0.2rem 0 0.4rem; font-weight: 600; position: sticky;
    top: 0; background: var(--bg); padding: 0.2rem 0; }
  .histlist { list-style: none; margin: 0; padding: 0; font-size: 0.85rem; }
  .histlist .tuhead { color: var(--faint); font-size: 0.76rem; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 0.5rem 0 0.1rem; border-bottom: 1px solid var(--border);
    margin-bottom: 0.15rem; }
  .histlist li { padding: 0.15rem 0; color: var(--muted); display: flex; gap: 0.5rem; }
  .histlist .pts { font-weight: 700; min-width: 2.2rem; text-align: right; }

  @media (max-width: 900px) {
    body { flex-direction: column; }
    .app { height: auto; overflow: visible; }
    .histbar { width: 100%; height: auto; max-height: 40vh; border-left: none;
      border-top: 1px solid var(--border); }
    .qtext, .bonus .leadin, .bpart .bq { font-size: 1.05rem; }
    .scoring { gap: 1rem; padding: 0.6rem 1rem 1rem; }
    .team { min-width: 100%; }
    .buzzbtn { flex: 1; padding: 0.85rem; }
    /* compact header: the set line is the title; buttons shrink to fit */
    header { padding: 0.45rem 0.7rem; gap: 0.4rem; }
    header h1 { display: none; }
    header .hbtn { padding: 0.3rem 0.5rem; font-size: 0.84rem; }
    select.hbtn { max-width: 7.2rem; }
    header .setname { width: 100%; order: 5; }
    main { padding: 0.7rem 1rem 1rem; }
    .adjrow { max-width: none; }
    /* player rows: name + score + 4 buttons must fit ~360px */
    .prow { padding: 0.4rem 0.5rem; gap: 0.45rem; }
    .prow .pname { font-size: 0.95rem; }
    .prow .pbtns { gap: 3px; }
    .prow .pbtns button { min-width: 2.35rem; padding: 0.3rem 0.15rem; font-size: 0.8rem; }
    .sheet.open { align-items: flex-end; }
    .sheet .card { border-radius: 14px 14px 0 0; margin: 0; max-height: 88vh; }
  }

  .sheet { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; z-index: 40; }
  .sheet.open { display: flex; align-items: center; justify-content: center; }
  .sheet .card { background: var(--raised); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.1rem 1.2rem 1.3rem; width: 100%; max-width: 560px;
    max-height: 85vh; overflow-y: auto; margin: 0 0.8rem; }
  .sheet h3 { margin: 0 0 0.6rem; color: var(--bright); font-size: 1rem; }
  .srow { display: flex; gap: 0.5rem; align-items: center; padding: 0.3rem 0; }
  .sheetfoot { margin-top: 0.9rem; display: flex; justify-content: flex-end; gap: 0.5rem; }
  .primary { background: var(--link); border-color: var(--link); color: #fff; }

  .tblock { border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 0.8rem;
    margin-bottom: 0.7rem; background: var(--input); }
  .tblock input, .tblock textarea { width: 100%; background: var(--bg);
    color: var(--text); border: 1px solid var(--border); border-radius: 7px;
    padding: 0.45rem 0.6rem; font: inherit; }
  .tblock label { display: block; color: var(--faint); font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.05em; margin: 0.4rem 0 0.2rem; }
  .tblock textarea { resize: vertical; min-height: 3.2rem; }

  #setlist { width: 100%; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>moderator</h1>
    <span class="setname" id="setname">no packet loaded</span>
    <span class="grow"></span>
    <button class="hbtn" id="setbtn">📦 Set</button>
    <select class="hbtn" id="modepick" title="Reading mode">
      <option value="audio">♪ TTS audio</option>
      <option value="reveal">Word-by-word reveal</option>
      <option value="text">Full text (I read)</option>
    </select>
    <button class="hbtn" id="roombtn">🌐 Room</button>
    <button class="hbtn" id="rosterbtn">👥 Players</button>
    <button class="hbtn" id="gearbtn" title="More settings">⚙</button>
  </header>

  <main>
    <div class="modeline" id="modeline"></div>
    <div class="qtext" id="qtext"><i class="faint">Pick a set and packet (📦) to start.</i></div>
    <div class="progress hidden" id="progress"><i id="progressfill"></i></div>
    <div class="anspanel hidden" id="anspanel"></div>
    <div class="bonus hidden" id="bonuspanel"></div>
    <div class="controls" id="controls">
      <button class="buzzbtn hidden" id="buzz">BUZZ (space)</button>
      <button class="hidden" id="playbtn">⏸</button>
      <label class="speedctl hidden" id="speedctl"><span id="wpmval">380</span> wpm
        <input type="range" id="wpm" min="120" max="700" step="10" value="380"></label>
      <label class="speedctl hidden" id="ratectl"><span id="vrateval">0.95x</span>
        <input type="range" id="vrate" min="0.6" max="1.6" step="0.05" value="0.95"></label>
      <button class="hidden" id="finishedbtn">Finished</button>
      <button class="hidden" id="deadbtn">Dead</button>
      <span class="grow"></span>
      <button class="hidden" id="nextbtn">Next ▸</button>
    </div>
    <div class="adjrow hidden" id="adjrow">
      <input type="text" id="givenanswer" placeholder="What did they say? (optional)">
      <span class="verdicthint" id="suggestion"></span>
      <button class="good" id="vcorrect">✓</button>
      <button class="bad" id="vwrong">✗</button>
    </div>
  </main>

  <div class="scoring" id="scoring"></div>
</div>

<div class="histbar">
  <h2>History</h2>
  <ul class="histlist" id="histlist"></ul>
</div>

<!-- set & packet sheet -->
<div class="sheet" id="setsheet">
  <div class="card">
    <h3>Set &amp; packet</h3>
    <input type="text" id="setsearch" placeholder="Search sets…" autocomplete="off" style="width:100%">
    <select id="setlist" size="8"></select>
    <div class="srow" style="margin-top:0.5rem">
      <select id="packetpick" style="flex:1"></select>
    </div>
    <div class="srow">
      <select id="modepick2" title="Reading mode" style="flex:1">
        <option value="audio">♪ TTS audio</option>
        <option value="reveal">Word-by-word reveal</option>
        <option value="text">Full text (I read)</option>
      </select>
    </div>
    <div class="srow" style="border-top:1px solid var(--border);margin-top:0.5rem;padding-top:0.6rem">
      <label for="upload" class="muted" style="margin:0">…or upload your own packets</label>
      <input type="file" id="upload" multiple accept=".docx,.txt"
        style="flex:1;min-width:0;font-size:0.85rem">
    </div>
    <div class="muted" id="setstatus">Loading catalog…</div>
    <div class="sheetfoot">
      <button onclick="document.getElementById('setsheet').classList.remove('open')">Cancel</button>
      <button class="primary" id="loadbtn" disabled>Read this packet</button>
    </div>
  </div>
</div>

<!-- roster sheet: bulk team/player entry -->
<div class="sheet" id="rostersheet">
  <div class="card">
    <h3>Players &amp; teams</h3>
    <div class="muted" style="margin-bottom:0.6rem">One name per line (or commas). Leave the
      team name blank for free-agent players. Removing a name here removes the player.</div>
    <div id="tblocks"></div>
    <button id="addteamblock">+ add another team</button>
    <div class="sheetfoot">
      <button onclick="document.getElementById('rostersheet').classList.remove('open')">Cancel</button>
      <button class="primary" id="rostersave">Save roster</button>
    </div>
  </div>
</div>

<!-- settings sheet -->
<div class="sheet" id="settingsheet">
  <div class="card">
    <h3>Settings</h3>
    <div class="srow"><input type="checkbox" checked id="optScoring"><label for="optScoring">Keep score</label></div>
    <div class="srow"><input type="checkbox" id="optSuper"><label for="optSuper">Superpowers (+20)</label></div>
    <div class="srow"><input type="checkbox" checked id="optBonuses"><label for="optBonuses">Bonuses</label></div>
    <div class="srow"><input type="checkbox" checked id="optChecker"><label for="optChecker">Checker verdict suggestions</label></div>
    <div class="sheetfoot">
      <button onclick="document.getElementById('settingsheet').classList.remove('open')">Done</button>
    </div>
  </div>
</div>

<script src="vendor/answer_checker.js"></script>
<script src="vendor/reveal_units.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
